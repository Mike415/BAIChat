<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BAI Area Boys</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0B141A;color:#E9EDEF;height:100vh;height:100dvh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}.safe-top{height:env(safe-area-inset-top);min-height:44px;background:#202C33;flex-shrink:0}.header{background:#202C33;padding:16px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222D34;flex-shrink:0}.header .avatar{width:40px;height:40px;border-radius:50%;background:#00A884;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px}.header .info{flex:1}.header .title{font-size:16px;font-weight:500;color:#E9EDEF}.header .subtitle{font-size:13px;color:#8696A0;margin-top:2px}.chat{flex:1;overflow-y:auto;padding:12px 8px calc(20px + env(safe-area-inset-bottom));background:#0B141A;display:flex;flex-direction:column;gap:2px}.message{display:flex;margin:1px 0}.message.in{justify-content:flex-start}.message.out{justify-content:flex-end}.bubble{max-width:75%;padding:6px 8px 4px;border-radius:7.5px;position:relative;word-wrap:break-word}.message.in .bubble{background:#202C33;border-top-left-radius:0;margin-left:8px}.message.out .bubble{background:#005C4B;border-top-right-radius:0;margin-right:8px}.sender{font-size:13px;font-weight:500;color:#53BDEB;margin-bottom:2px}.text{font-size:14.2px;line-height:19px;color:#E9EDEF;white-space:pre-wrap}.meta{display:flex;justify-content:flex-end;align-items:center;gap:3px;margin-top:2px;margin-left:6px;float:right;clear:both}.time{font-size:11px;color:#8696A0;white-space:nowrap}.status{font-size:11px;color:#53BDEB;margin-left:2px}@media(max-width:640px){.bubble{max-width:85%}.text{font-size:14px}}</style>
</head><body><div class="safe-top"></div><div class="header"><div class="avatar">B</div><div class="info"><div class="title">BAI Area Boys</div><div class="subtitle">Mike, Steve, Eric, John R, John F • 0 messages</div></div></div><div class="chat"></div><script>document.querySelector('.chat').scrollTop=999999</script></body></html>
